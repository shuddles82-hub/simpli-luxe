<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Simpli Luxe</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:20px;
    padding:24px;
    text-align:center;
    background:#0D0D0D;
    font-family:Georgia,'Times New Roman',serif;
  }
  .mark{font-size:13px;letter-spacing:0.4em;text-transform:uppercase;color:#C9A96E;}
  .msg{
    font-family:Georgia,'Times New Roman',serif;
    font-style:italic;
    font-weight:300;
    font-size:22px;
    color:#FDFAF5;
    max-width:420px;
    line-height:1.5;
  }
  .sub{font-family:Arial,sans-serif;font-weight:300;font-size:11px;letter-spacing:0.1em;color:rgba(253,250,245,0.4);}
</style>
</head>
<body>
  <div class="mark">Simpli Luxe</div>
  <div class="msg">Nothing here yet. Something lovely is on the way once you're back online.</div>
  <div class="sub">Check your connection, then try again.</div>
</body>
</html>
